<!DOCTYPE html>
<html>
<head>
<style>
  :root { --pink: #ff758c; --dark: #121212; }
  body { background: var(--dark); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; margin: 0; }

  /* 1. THE ENVELOPE */
  .env-wrapper { position: relative; cursor: pointer; transition: 0.3s; }
  .envelope { position: relative; width: 200px; height: 130px; background: #f08080; border-radius: 0 0 5px 5px; z-index: 1; }
  .envelope::before { /* The Flap */
    content: ""; position: absolute; top: 0; border-top: 70px solid #f08080; 
    border-left: 100px solid transparent; border-right: 100px solid transparent;
    transform-origin: top; transition: 0.5s ease; z-index: 3;
  }
  .open.envelope::before { transform: rotateX(180deg); z-index: 0; }
  
  .letter { /* The Note */
    position: absolute; bottom: 0; left: 10px; width: 180px; height: 100px;
    background: white; text-align: center; transition: 0.5s; z-index: 2; padding-top: 10px;
  }
  .open .letter { transform: translateY(-70px); }

  /* 2. THE SURPRISE (Initially Hidden) */
  #surprise { display: none; text-align: center; }
  
  .cake { font-size: 100px; animation: dance 1s infinite alternate ease-in-out; }
  @keyframes dance { from { transform: rotate(-10deg); } to { transform: rotate(10deg) translateY(-20px); } }

  .balloons { 
    position: absolute; width: 100%; top: 20%; left: 0;
    font-size: 3rem; font-weight: bold; color: white;
    animation: float 3s infinite ease-in-out; text-shadow: 0 0 15px var(--pink);
  }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }

  /* Fading transitions */
  .fade-out { opacity: 0; transition: 0.5s; pointer-events: none; }
</style>
</head>
<body>

  <div class="env-wrapper" id="stage" onclick="startSurprise()">
    <div class="envelope" id="env">
      <div class="letter"><p style="color:#333; font-size:12px;">For Ann...<br><b>OPEN ME</b></p></div>
    </div>
  </div>

  <div id="surprise">
    <div class="balloons">🎈 HAPPY BIRTHDAY ANN 🎈</div>
    <div class="cake">🎂</div>
    <p style="color:var(--pink); font-style:italic; margin-top:20px;">Compiled with love by Alex Dev</p>
  </div>

  <script>
    function startSurprise() {
      const env = document.getElementById('env');
      const stage = document.getElementById('stage');
      const surprise = document.getElementById('surprise');

      // Step 1: Open Flap & Lift Note
      env.classList.add('open');

      // Step 2: Fade out envelope, show dancing cake & balloons
      setTimeout(() => {
        stage.classList.add('fade-out');
        setTimeout(() => {
          stage.style.display = 'none';
          surprise.style.display = 'block';
        }, 500);
      }, 2000);
    }
  </script>
</body>
</html>
