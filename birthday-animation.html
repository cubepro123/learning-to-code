<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background-color: #121212; /* Dark background */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .card {
    background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
    width: 350px;
    padding: 40px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 1.5s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .cake {
    font-size: 80px;
    margin-bottom: 20px;
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .Happy__Birthday {
    color: #c2185b;
    font-size: 2.5rem;
    font-weight: 700;
    text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.5);
    margin: 0;
    animation: glow 2s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.5); }
    50% { text-shadow: 2px 2px 20px rgba(255, 255, 255, 0.8); }
  }

  .subtext {
    color: #fff;
    margin-top: 15px;
    font-style: italic;
    opacity: 0.8;
  }

  /* Floating balloons */
  .balloon {
    position: absolute;
    font-size: 50px;
    animation: float-up 8s ease-in infinite;
  }

  @keyframes float-up {
    0% {
      transform: translateY(100vh) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(-100vh) rotate(360deg);
      opacity: 0;
    }
  }

  .balloon:nth-child(1) { left: 10%; animation-delay: 0s; }
  .balloon:nth-child(2) { left: 30%; animation-delay: 2s; }
  .balloon:nth-child(3) { left: 50%; animation-delay: 4s; }
  .balloon:nth-child(4) { left: 70%; animation-delay: 1s; }
  .balloon:nth-child(5) { left: 90%; animation-delay: 3s; }

  /* Confetti */
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall 5s linear infinite;
  }

  @keyframes fall {
    0% {
      transform: translateY(-100vh) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) rotate(360deg);
      opacity: 0.5;
    }
  }
</style>
</head>
<body>

  <!-- Balloons -->
  <div class="balloon">🎈</div>
  <div class="balloon">🎈</div>
  <div class="balloon">🎈</div>
  <div class="balloon">🎈</div>
  <div class="balloon">🎈</div>

  <div class="card">
    <div class="cake">🎂</div>
    <h1 class="Happy__Birthday">Happy Birthday Ann</h1>
    <p class="subtext">Wishing you an amazing day! 🌸✨</p>
  </div>

  <script>
    // Create confetti
    function createConfetti() {
      const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a8e6cf', '#ff6b9d', '#ffd700'];
      for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 5 + 's';
        confetti.style.animationDuration = (Math.random() * 3 + 4) + 's';
        document.body.appendChild(confetti);
      }
    }

    createConfetti();

    // Optional: Play birthday message on click
    document.body.addEventListener('click', function() {
      const msg = new SpeechSynthesisUtterance('Happy Birthday Ann!');
      window.speechSynthesis.speak(msg);
    });
  </script>

</body>
</html>
